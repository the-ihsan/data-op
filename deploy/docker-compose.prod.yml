# Production stack for a VPS. Data persists in named volumes — never run
# `docker compose down -v` in production (that deletes db_data).
#
# VPS (no source checkout):
#   curl -fsSL https://github.com/the-ihsan/data-op/raw/master/scripts/deploy.sh | bash -s -- v1.2.3
#
# Local with repo checkout (build image on machine):
#   cp api/.env.example api/.env && edit secrets
#   cd deploy && ./deploy.sh

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_DATABASE:?set DB_DATABASE in .env}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ${DATAOP_IMAGE:-dataop-app}:${DATAOP_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - ../api/.env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: root
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage

volumes:
  db_data:
  app_storage:
